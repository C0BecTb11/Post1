<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная | Новый Рассвет</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header-banner">
    <img src="images/logo.png" alt="Логотип: Постапокалипсис Лиорема" class="header-logo">
    <h1 class="banner-title">Новый Рассвет</h1>
  </header>

  <nav class="nav-container main-nav">
    <div class="nav-button main-nav" data-target="lore">Лор</div>
    <div class="nav-button main-nav" data-target="faq">FAQ</div>
    <div class="nav-button main-nav" data-target="rules">Правила</div>
    <div class="nav-button main-nav" data-target="resources">Ресурсы</div>
    <div class="nav-button main-nav" data-target="map">Карта</div>
  </nav>
  
  <main id="content-container" class="content">
    <p style="text-align: center; color: #aaa;">Выберите раздел, чтобы начать.</p>
  </main>

  <div id="location-modal" class="location-modal hidden">
    <div class="location-content">
      <button class="location-close-btn" onclick="closeLocationModal()">×</button>

            <div class="location-top-section">
        <img id="location-img" class="location-image" src="" alt="Фото локации">
        
        <video id="location-video" class="location-image hidden" src="" autoplay loop muted playsinline></video>
        
        <div class="location-short-info">
          <h2 id="location-title"></h2>
          <p><strong>Кому принадлежит:</strong> <span id="location-owner"></span></p>
        </div>
      </div>

      <div class="location-full-description">
        <h3>Описание:</h3>
        <div id="location-description"></div>
      </div>
    </div>
  </div>
  <audio id="click-sound" src="assets/sounds/click.mp3" preload="auto"></audio>
  <script src="locations.js"></script>
  <script src="script.js?v=11"></script>
</body>
</html>
